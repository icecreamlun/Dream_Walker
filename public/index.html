<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dream Walker — A Ledger of Nocturnal Images</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #16110b;
    --paper-2: #1d1610;
    --ink: #e8d8b8;
    --ink-soft: #b3a487;
    --ink-faint: #6b614b;
    --rule: #322a1d;
    --brass: #c79a4a;
    --brass-deep: #8a6920;
    --blood: #a04a36;
    --serif: "EB Garamond", "Iowan Old Style", Georgia, serif;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink);
    background: var(--paper);
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(199,154,74,0.07), transparent 70%),
      radial-gradient(ellipse 100% 50% at 50% 110%, rgba(160,74,54,0.06), transparent 70%);
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    padding: 56px 28px 200px;
  }

  /* ── masthead ───────────────────────────────── */
  .mast {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .mast h1 {
    margin: 0;
    font-weight: 500;
    font-size: 38px;
    letter-spacing: 0.02em;
    line-height: 1;
    font-style: italic;
  }
  .mast .sub {
    color: var(--ink-soft);
    font-size: 15px;
    margin-top: 4px;
    font-style: italic;
  }
  .mast .meta {
    text-align: right;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    line-height: 1.6;
  }
  .mast .meta b { color: var(--ink-soft); font-weight: 500; }

  /* ── section labels ─────────────────────────── */
  .lbl {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 44px 0 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .lbl::after {
    content: "";
    flex: 1;
    border-bottom: 1px dotted var(--rule);
    transform: translateY(-2px);
  }
  .lbl .num { color: var(--brass); }

  /* ── archive ledger ─────────────────────────── */
  .ledger { display: flex; flex-direction: column; gap: 0; }
  .entry {
    display: grid;
    grid-template-columns: 56px 96px 1fr;
    gap: 18px;
    padding: 18px 0;
    border-bottom: 1px dotted var(--rule);
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
  }
  .entry:hover { background: rgba(199,154,74,0.04); }
  .entry-num {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    padding-top: 2px;
  }
  .entry-thumb {
    aspect-ratio: 16/10;
    border-radius: 2px;
    overflow: hidden;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    display: block;
  }
  .entry-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .entry-thumb .pending {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-faint);
    animation: breath 2.4s ease-in-out infinite;
  }
  @keyframes breath { 50% { opacity: 0.4; } }
  .entry-body { min-width: 0; }
  .entry-body .text {
    font-style: italic;
    color: var(--ink);
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .entry-body .foot {
    display: flex;
    gap: 14px;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .entry-body .foot .status-ready { color: var(--brass); }
  .entry-body .foot .status-failed { color: var(--blood); }

  /* ── consult / chat ─────────────────────────── */
  .scroll {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .turn { padding: 0; }
  .turn-meta {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .turn.user .turn-meta { color: var(--ink-faint); }
  .turn.user .body {
    font-style: italic;
    color: var(--ink-soft);
    border-left: 1px solid var(--rule);
    padding-left: 14px;
    margin: 0;
  }
  .turn.assistant {
    padding-left: 0;
  }
  .turn.assistant .turn-meta { color: var(--brass-deep); }
  .turn.assistant .body {
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink);
    margin: 0;
  }
  .turn.assistant .body a { color: var(--brass); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; }
  .turn.thinking .body {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    animation: breath 1.6s ease-in-out infinite;
  }

  .empty {
    padding: 24px 0;
    color: var(--ink-soft);
    font-style: italic;
  }
  .empty p { margin: 0 0 8px; }
  .empty .hint {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 16px;
    font-style: normal;
  }

  /* ── composer ───────────────────────────────── */
  .composer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--paper) 60%, transparent);
    padding: 24px 28px 28px;
  }
  .composer-inner {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 14px;
    border-top: 1px solid var(--rule);
    padding-top: 18px;
  }
  .composer .caret {
    font-family: var(--mono);
    color: var(--brass);
    font-size: 16px;
    padding: 12px 0;
    user-select: none;
  }
  .composer textarea {
    flex: 1;
    background: transparent;
    color: var(--ink);
    border: none;
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.5;
    resize: none;
    min-height: 28px;
    max-height: 180px;
    padding: 12px 0;
    outline: none;
  }
  .composer textarea::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }
  .composer button {
    background: transparent;
    color: var(--ink-faint);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    align-self: center;
  }
  .composer button:hover:not(:disabled) {
    color: var(--brass);
    border-color: var(--brass);
  }
  .composer button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── colophon ───────────────────────────────── */
  .colophon {
    margin-top: 80px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  @media (max-width: 540px) {
    .page { padding: 36px 22px 220px; }
    .mast { grid-template-columns: 1fr; gap: 8px; }
    .mast .meta { text-align: left; }
    .mast h1 { font-size: 32px; }
    .entry { grid-template-columns: 40px 1fr; gap: 12px; }
    .entry-thumb { display: none; }
  }
</style>
</head>
<body>

<div class="page">

  <header class="mast">
    <div>
      <h1>Dream Walker</h1>
      <div class="sub">A ledger of nocturnal images, kept in plain ink.</div>
    </div>
    <div class="meta">
      <div><b>Vol.</b> I</div>
      <div id="mast-date">—</div>
      <div id="mast-count">—</div>
    </div>
  </header>

  <div id="ledger-section" style="display:none">
    <div class="lbl"><span>Archive</span> <span class="num" id="ledger-count"></span></div>
    <div class="ledger" id="ledger"></div>
  </div>

  <div class="lbl"><span>Consult</span></div>
  <div class="scroll" id="chat"></div>

  <footer class="colophon">
    <span>Photon · GMI · PixVerse · HydraDB</span>
    <span>Build Matcha &amp; Code MMXXVI</span>
  </footer>
</div>

<div class="composer">
  <div class="composer-inner">
    <span class="caret">›</span>
    <textarea id="input" placeholder="Recount a dream, or ask after one already told." rows="1"></textarea>
    <button id="send" title="send">Send ↵</button>
  </div>
</div>

<script>
const STORAGE_KEY = "dream-walker-uid";
let uid = localStorage.getItem(STORAGE_KEY);
if (!uid) {
  uid = "web:" + crypto.randomUUID();
  localStorage.setItem(STORAGE_KEY, uid);
}

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");

document.getElementById("mast-date").textContent = new Date().toLocaleDateString("en-US", {
  month: "short", day: "2-digit", year: "numeric",
}).toUpperCase();

function fmt(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}

function escape(s) {
  return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function linkify(s) {
  return escape(s).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function pad(n, w) { return String(n).padStart(w, "0"); }

function renderTurn(role, content, ts) {
  const wrap = document.createElement("article");
  wrap.className = `turn ${role}`;
  const meta = document.createElement("div");
  meta.className = "turn-meta";
  meta.textContent = role === "user" ? `Querent · ${fmt(ts)}` : `Walker · ${fmt(ts)}`;
  const body = document.createElement("div");
  body.className = "body";
  body.innerHTML = linkify(content);
  wrap.appendChild(meta);
  wrap.appendChild(body);
  chat.appendChild(wrap);
  wrap.scrollIntoView({ behavior: "smooth", block: "end" });
  return wrap;
}

function renderEmpty() {
  chat.innerHTML = `
    <div class="empty">
      <p>The ledger awaits an entry.</p>
      <p>Begin with a dream. The Walker will inquire, render, and remember.</p>
      <div class="hint">— or text +1 415 605 7073 —</div>
    </div>
  `;
}

async function loadHistory() {
  try {
    const res = await fetch("/conversation/" + encodeURIComponent(uid));
    const conv = await res.json();
    chat.innerHTML = "";
    if (!conv.messages?.length) { renderEmpty(); return; }
    for (const m of conv.messages) renderTurn(m.role, m.content, m.timestamp);
  } catch {
    renderEmpty();
  }
}

async function loadLedger() {
  try {
    const r = await fetch("/dreams.json");
    const dreams = await r.json();
    const section = document.getElementById("ledger-section");
    const ledger = document.getElementById("ledger");
    const counter = document.getElementById("ledger-count");
    document.getElementById("mast-count").textContent =
      `${dreams.length} ${dreams.length === 1 ? "ENTRY" : "ENTRIES"}`;
    if (!dreams.length) { section.style.display = "none"; return; }
    section.style.display = "";
    counter.textContent = `№ ${pad(dreams.length, 3)}`;
    // Newest first; number them descending so the latest is the highest entry no.
    ledger.innerHTML = dreams.map((d, i) => {
      const n = dreams.length - i;
      const status = d.status === "ready" ? "ready"
        : d.status === "failed" ? "failed"
        : "painting";
      const thumb = d.thumbnail_url
        ? `<img src="${escape(d.thumbnail_url)}" alt="">`
        : `<div class="pending">${escape(status)}</div>`;
      const date = new Date(d.created_at).toLocaleDateString("en-US", {
        month: "short", day: "2-digit",
      }).toUpperCase();
      return `<a class="entry" href="/dream/${escape(d.dream_id)}">
        <div class="entry-num">№ ${pad(n, 3)}</div>
        <div class="entry-thumb">${thumb}</div>
        <div class="entry-body">
          <p class="text">${escape(d.raw_text)}</p>
          <div class="foot">
            <span>${date}</span>
            <span class="status-${escape(d.status)}">${escape(status)}</span>
          </div>
        </div>
      </a>`;
    }).join("");
  } catch (e) {
    console.error("ledger load failed", e);
  }
}

function autosize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 180) + "px";
}
input.addEventListener("input", autosize);

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  autosize();
  sendBtn.disabled = true;

  if (chat.querySelector(".empty")) chat.innerHTML = "";

  renderTurn("user", text, new Date().toISOString());

  const t = document.createElement("article");
  t.className = "turn thinking";
  t.innerHTML = `<div class="body">consulting the bones</div>`;
  chat.appendChild(t);
  t.scrollIntoView({ behavior: "smooth", block: "end" });

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: uid, text }),
    });
    const data = await res.json();
    t.remove();
    renderTurn("assistant", data.reply || data.error || "—", new Date().toISOString());
    // Refresh ledger so a new dream entry appears immediately.
    if (data.intent === "new_dream") loadLedger();
  } catch (e) {
    t.remove();
    renderTurn("assistant", "(network silence) " + e.message, new Date().toISOString());
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener("click", send);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

loadLedger();
loadHistory();
input.focus();
setInterval(loadLedger, 8000);
</script>
</body>
</html>
