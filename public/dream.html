<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dream Walker</title>
<style>
  :root {
    --bg: #0c0a14;
    --fg: #f3eee5;
    --muted: #a8a094;
    --accent: #c8b48a;
  }
  * { box-sizing: border-box }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
    background: radial-gradient(circle at 30% 10%, #1d162a 0%, var(--bg) 60%);
    color: var(--fg);
    min-height: 100vh;
  }
  main { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }
  header { text-align: center; margin-bottom: 28px; }
  .moon { font-size: 36px; }
  h1 { font-weight: 400; letter-spacing: 0.04em; font-size: 22px; margin: 4px 0 0; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
  .video {
    width: 100%; aspect-ratio: 16/9; border-radius: 14px; overflow: hidden;
    background: #000; box-shadow: 0 20px 60px -20px rgba(0,0,0,0.7);
  }
  .video video { width: 100%; height: 100%; object-fit: cover; }
  .pending {
    width: 100%; aspect-ratio: 16/9; border-radius: 14px;
    background: linear-gradient(120deg, #1d162a, #2a1f3d);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.55 } }
  .raw {
    margin-top: 22px; padding: 20px;
    border-left: 2px solid var(--accent);
    color: var(--fg); font-style: italic; line-height: 1.55;
    background: rgba(255,255,255,0.02);
  }
  .label { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 6px; font-style: normal; }
  footer { text-align: center; margin-top: 40px; color: var(--muted); font-size: 11px; letter-spacing: 0.08em; }
  footer .stack { margin-top: 6px; opacity: 0.7; }
  .err { color: #e88; margin-top: 14px; font-size: 13px; }
</style>
</head>
<body>
<main>
  <header>
    <div class="moon">🌙</div>
    <h1>{{TITLE}}</h1>
    <div class="meta">{{META}}</div>
  </header>

  {{VIDEO_BLOCK}}

  <div class="raw">
    <div class="label">As you told it</div>
    {{RAW_TEXT}}
  </div>

  {{ERROR_BLOCK}}

  <footer>
    Dream Walker
    <div class="stack">Photon · PixVerse · GMI · HydraDB</div>
  </footer>
</main>
{{REFRESH_SCRIPT}}
</body>
</html>
