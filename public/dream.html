<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>{{TITLE}} — Dream Walker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #16110b;
    --paper-2: #1d1610;
    --ink: #e8d8b8;
    --ink-soft: #b3a487;
    --ink-faint: #6b614b;
    --rule: #322a1d;
    --brass: #c79a4a;
    --brass-deep: #8a6920;
    --blood: #a04a36;
    --serif: "EB Garamond", "Iowan Old Style", Georgia, serif;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --card-bg: rgba(255,255,255,0.03);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: var(--serif);
    background: var(--paper);
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(199,154,74,0.06), transparent 70%),
      radial-gradient(ellipse 80% 50% at 50% 110%, rgba(160,74,54,0.05), transparent 70%);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .page { max-width: 720px; margin: 0 auto; padding: 56px 28px 80px; }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 32px;
  }
  .topbar a {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-decoration: none;
  }
  .topbar a:hover { color: var(--brass); }
  .topbar .title {
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
  }

  .hd-meta {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }
  .hd-title {
    font-style: italic;
    font-size: 26px;
    line-height: 1.25;
    color: var(--ink);
    margin: 0 0 28px;
    font-weight: 500;
  }

  .video, .pending {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 3px;
    overflow: hidden;
    background: var(--paper-2);
    border: 1px solid var(--rule);
  }
  .video video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .pending {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-faint);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    animation: breath 2.4s ease-in-out infinite;
  }
  @keyframes breath { 50% { opacity: 0.45; } }

  .raw {
    margin-top: 32px;
    padding: 20px 0 0;
    border-top: 1px dotted var(--rule);
  }
  .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 12px;
  }
  .raw-body {
    font-style: italic;
    font-size: 19px;
    line-height: 1.6;
    color: var(--ink);
    margin: 0;
  }

  /* Divination section */
  .divination {
    margin-top: 28px; padding: 24px;
    background: var(--card-bg);
    border-radius: 12px;
    border: 1px solid rgba(199,154,74,0.15);
  }
  .gua-header {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 12px;
  }
  .gua-name {
    font-size: 32px; font-weight: 300; color: var(--brass);
    font-family: "Songti SC", "Noto Serif CJK SC", serif;
  }
  .gua-meaning { color: var(--ink-soft); font-size: 13px; }
  .interpretation {
    font-size: 14px; line-height: 1.65; color: var(--ink);
    opacity: 0.9;
  }

  /* Resonance section */
  .resonance {
    margin-top: 32px;
  }
  .resonance-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .resonance-cards {
    display: flex; flex-direction: column; gap: 12px;
  }
  .resonance-card {
    padding: 16px 20px;
    background: var(--card-bg);
    border-radius: 10px;
    border: 1px solid var(--rule);
  }
  .resonance-card .card-summary {
    font-size: 14px; line-height: 1.5; color: var(--ink);
    font-style: italic; opacity: 0.85;
  }
  .resonance-card .card-meta {
    margin-top: 8px; font-size: 11px; color: var(--ink-faint);
    font-family: var(--mono);
  }

  .err {
    margin-top: 18px;
    padding: 12px 14px;
    border-left: 2px solid var(--blood);
    color: var(--blood);
    font-family: var(--mono);
    font-size: 12px;
    background: rgba(160,74,54,0.07);
  }

  .colophon {
    margin-top: 80px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  @media (max-width: 540px) {
    .page { padding: 36px 22px 60px; }
    .hd-title { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="/">← Ledger</a>
    <span class="title">Dream Walker</span>
  </div>

  <div class="hd-meta">{{META}}</div>
  <h1 class="hd-title">{{TITLE}}</h1>

  {{VIDEO_BLOCK}}

  <div class="raw">
    <div class="label">As told</div>
    <p class="raw-body">{{RAW_TEXT}}</p>
  </div>

  {{DIVINATION_BLOCK}}

  {{RESONANCE_BLOCK}}

  {{ERROR_BLOCK}}

  <footer class="colophon">
    <span>Photon · GMI · PixVerse · HydraDB</span>
    <span>Build Matcha &amp; Code MMXXVI</span>
  </footer>
</div>
{{REFRESH_SCRIPT}}
</body>
</html>
